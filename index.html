        --wine: #561c26;
        --navy: #172b49;
        --gold: #bb9d6d;
        --stone: #c8b6ac;
        --muted: rgba(17, 25, 31, 0.72);
        --line: rgba(17, 25, 31, 0.12);
        --shadow: 0 24px 70px rgba(17, 25, 31, 0.12);
        --radius: 8px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Montserrat", sans-serif;
        color: var(--ink);
        background:

      .page {

        margin: 0 auto;
        padding: 18px 0 34px;

      .hero {

        border-radius: var(--radius);
        background:

          linear-gradient(180deg, rgba(86, 28, 38, 0.18), rgba(187, 157, 109, 0.08));
        box-shadow: var(--shadow);
        padding: 26px;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        border: 1px solid rgba(187, 157, 109, 0.3);
      }

      .hero::before {
        width: 360px;
        height: 360px;
        right: -100px;
        top: -120px;
      }

      .hero::after {
        width: 220px;
        height: 220px;
        right: 120px;
        bottom: -110px;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1.45fr 0.95fr;
        gap: 18px;
        align-items: stretch;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      .brand-mark {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        border: 1px solid rgba(187, 157, 109, 0.72);
        display: grid;
        place-items: center;
        color: var(--gold);
        font-weight: 700;
        position: relative;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        border: 1px solid rgba(200, 182, 172, 0.22);
      }

      .brand-label {
        color: rgba(255, 255, 255, 0.72);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .brand-name {
        color: #fff;
        font-size: 23px;
        line-height: 1.08;
        font-weight: 600;
        max-width: 18ch;
      }

      .hero h1 {
        margin: 0 0 14px;
        color: #fff;
        font-size: clamp(32px, 4.4vw, 58px);
        line-height: 0.98;
        max-width: 11ch;
      }

      .hero-copy {
        color: rgba(255, 255, 255, 0.8);
        font-size: 15px;
        line-height: 1.68;
        max-width: 66ch;
        margin: 0;
      }

      .hero-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 18px 0 22px;
      }

      .hero-meta-card {
        border-radius: var(--radius);
        padding: 14px 15px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(10px);
      }

      .hero-meta-label {
        color: rgba(255, 255, 255, 0.66);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;

      .hero-meta-value {
        color: #fff;
        font-size: clamp(16px, 2vw, 20px);
        font-weight: 700;
        line-height: 1.35;

        letter-spacing: 0.08em;

        font-size: 16px;
        font-weight: 700;
        line-height: 1.4;

      .glass-note {

        font-size: 13px;
        line-height: 1.58;
        margin-top: 8px;

        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;

      .metric .value {

        font-size: 34px;
        font-weight: 800;
        line-height: 1;
      }

      .metric .note {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
        margin-top: 8px;
      }

      .layout {

        grid-template-columns: 1.16fr 0.84fr;
        gap: 18px;
        margin-top: 18px;

      .panel {

        left: 0;
        top: 8px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);

        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .todo {
        padding: 14px;
        display: grid;
        grid-template-columns: auto 1fr;

        width: 18px;
        height: 18px;

        border: 1px solid rgba(17, 25, 31, 0.22);

        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;

        grid-template-columns: 1fr 1fr;
        gap: 18px;

        padding: 18px 20px;
        border-radius: var(--radius);
        background: rgba(17, 25, 31, 0.95);
        color: rgba(255, 255, 255, 0.78);

        line-height: 1.66;

      @media (max-width: 1160px) {

        .page { width: min(100vw - 16px, 1280px); }
        .hero, .panel, .metric { padding: 18px; }
        .event { grid-template-columns: 1fr; }
        .brand-name { font-size: 19px; }
        .hero h1 { max-width: none; }
        .hero-copy {

        .hero-meta { grid-template-columns: 1fr; }
        .hero-meta-card { padding: 13px 14px; }
        .hero-meta-value { font-size: 17px; line-height: 1.4; }
        .panel h2 { font-size: 21px; }
      }
    </style>
