        border-radius: 999px;
        border: 1px solid rgba(187, 157, 109, 0.3);
      }

      .hero::before {
        width: 360px;
        height: 360px;
        right: -100px;
        top: -120px;
      }

      .hero::after {
        width: 220px;
        height: 220px;
        right: 120px;
        bottom: -110px;

      .brand-mark {

        border: 1px solid rgba(187, 157, 109, 0.72);
        display: grid;
        place-items: center;
        color: var(--gold);
        font-weight: 700;
        position: relative;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        border: 1px solid rgba(200, 182, 172, 0.22);
      }

      .brand-label {

        font-weight: 600;
