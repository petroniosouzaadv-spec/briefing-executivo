        --radius: 8px;

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Montserrat", sans-serif;
        color: var(--ink);
        background:

      }

      a { color: inherit; text-decoration: none; }
      #root { min-height: 100vh; }

      .page {
        width: min(1280px, calc(100vw - 28px));
        margin: 0 auto;
        padding: 18px 0 34px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        border-radius: var(--radius);
        background:
          linear-gradient(135deg, rgba(17, 25, 31, 0.98), rgba(23, 43, 73, 0.95)),
          linear-gradient(180deg, rgba(86, 28, 38, 0.18), rgba(187, 157, 109, 0.08));
        box-shadow: var(--shadow);
        padding: 26px;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        border: 1px solid rgba(187, 157, 109, 0.3);
      }

      .hero::before {
        width: 360px;
        height: 360px;
        right: -100px;
        top: -120px;
      }

      .hero::after {
        width: 220px;
        height: 220px;
        right: 120px;
        bottom: -110px;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1.45fr 0.95fr;
        gap: 18px;
        align-items: stretch;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 24px;
      }

      .brand-mark {
        width: 58px;
        height: 58px;
        border-radius: 50%;
        border: 1px solid rgba(187, 157, 109, 0.72);
        display: grid;
        place-items: center;
        color: var(--gold);
        font-weight: 700;
        position: relative;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        border: 1px solid rgba(200, 182, 172, 0.22);
      }

      .brand-label {
        color: rgba(255, 255, 255, 0.72);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 6px;
      }

      .brand-name {
        color: #fff;
        font-size: 23px;
        line-height: 1.08;
        font-weight: 600;
        max-width: 18ch;
      }

      .hero h1 {
        margin: 0 0 14px;
        color: #fff;
        font-size: clamp(32px, 4.4vw, 58px);
        line-height: 0.98;
        max-width: 10ch;
      }

      .hero-copy {
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        line-height: 1.68;
        max-width: 64ch;
        margin: 0;
      }

      .hero-side {
        display: grid;
        gap: 14px;
      }

      .glass {
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.09);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(12px);
        padding: 18px;
      }

      .glass-label,
      .mini-label {
        color: rgba(255, 255, 255, 0.64);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;

      .glass-value {
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.4;
      }

      .glass-note {
        color: rgba(255, 255, 255, 0.72);
        font-size: 13px;
        line-height: 1.58;
        margin-top: 8px;
      }

        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;

        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 10px;

        font-weight: 800;

        font-size: 13px;
        line-height: 1.5;
        margin-top: 8px;

      .body {

        font-size: 13px;
        line-height: 1.62;
      }

        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

        min-height: 28px;
        border-radius: 999px;
        padding: 0 10px;
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.04em;

      .critical { background: rgba(86, 28, 38, 0.12); color: var(--wine); }
      .watch { background: rgba(187, 157, 109, 0.18); color: #7a6540; }
      .ok { background: rgba(23, 43, 73, 0.1); color: var(--navy); }

      .link {
        display: inline-flex;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 700;
        color: var(--navy);

        gap: 14px;
        padding: 14px;

      .when {
        font-size: 13px;
        font-weight: 700;
        color: var(--navy);
      }

      .prep {
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 7px;

      .prep li {
        font-size: 13px;
        line-height: 1.56;
        padding-left: 15px;
        position: relative;

        content: "";

        left: 0;
        top: 8px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);

        color: var(--muted);

        text-transform: uppercase;
        letter-spacing: 0.05em;

        font-size: 11px;

      .footer {

        grid-template-columns: 1fr 1fr;

        background: rgba(17, 25, 31, 0.95);
