      body {

      .hero {

        padding: 26px;

        content: "";
        position: absolute;
        border-radius: 999px;
        border: 1px solid rgba(187, 157, 109, 0.3);
      }

      .hero::before {
        width: 360px;
        height: 360px;
        right: -100px;
        top: -120px;
      }

      .hero::after {
        width: 220px;
        height: 220px;
        right: 120px;
        bottom: -110px;
      }

        gap: 14px;

        position: relative;

        position: absolute;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        border: 1px solid rgba(200, 182, 172, 0.22);

        line-height: 1.58;
        margin-top: 8px;
